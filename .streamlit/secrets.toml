# Project Antigravity X Secrets Template
# Paste your keys here if running locally, OR into Streamlit Cloud "Secrets" if deployed.

[api_keys]
# Optional: Fallbacks for fundamental data if yfinance fails
finnhub_key = "YOUR_FINNHUB_KEY"
fmp_key = "YOUR_FMP_KEY"

[github]
# Required for Portfolio State Sync
pat_token = "YOUR_GITHUB_PERSONAL_ACCESS_TOKEN"

[webhooks]
# Required for n8n execution pipelines
n8n_url = "YOUR_N8N_WEBHOOK_URL"
